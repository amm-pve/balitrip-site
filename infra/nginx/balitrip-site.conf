server {
    listen 80;
    server_name _;

    root /var/www/balitrip-site;
    index index.html;

    # Static assets
    location /css/ {
        alias /var/www/balitrip-site/css/;
    }

    location /js/ {
        alias /var/www/balitrip-site/js/;
    }

    location /assets/ {
        alias /var/www/balitrip-site/assets/;
    }

    # HTML pages
    location / {
        try_files $uri $uri/ =404;
    }
}
